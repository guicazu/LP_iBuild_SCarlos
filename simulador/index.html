<section id="simulador" class="soe-section">
  <div class="soe-container">

    <!-- HEADER DO SIMULADOR -->
    <div class="soe-header">
      <span class="soe-badge">💰 Simulador de Orçamento</span>
      <h2 class="soe-title">Simule o valor da <span>sua casa</span></h2>
      <p class="soe-subtitle">
        Responda abaixo e tenha uma estimativa personalizada para seu projeto em Light Steel Frame.
      </p>
    </div>

    <!--  -->
    <!-- ETAPA 1: PERGUNTAS INICIAIS                                -->
    <!--  -->
    <div id="soe-step-1" class="soe-step active">

      <!-- PERGUNTA 1: Terreno -->
      <div class="soe-question">
        <p class="soe-question-label">📋 Você já tem o terreno?</p>
        <div class="soe-options" data-question="terreno">
          <button class="soe-option" data-value="sim" onclick="selectOption(this)">
            <span class="soe-option-icon">✅</span>
            Sim, já tenho
          </button>
          <button class="soe-option" data-value="nao" onclick="selectOption(this)">
            <span class="soe-option-icon">🔍</span>
            Não, preciso de ajuda
          </button>
        </div>
      </div>

      <!-- PERGUNTA 2: Projeto Arquitetônico -->
      <div class="soe-question">
        <p class="soe-question-label">📐 Você já tem um projeto arquitetônico?</p>
        <div class="soe-options" data-question="projeto">
          <button class="soe-option" data-value="sim" onclick="selectOption(this)">
            <span class="soe-option-icon">✅</span>
            Sim, já tenho
          </button>
          <button class="soe-option" data-value="nao" onclick="selectOption(this)">
            <span class="soe-option-icon">📝</span>
            Não, preciso de um
          </button>
        </div>
      </div>

      <!-- BOTÃO DE AÇÃO PRINCIPAL -->
      <div class="soe-action">
        <button id="btn-monte-sua-casa" class="soe-cta" onclick="avancarSimulador()" disabled>
          🏠 Monte sua casa
        </button>
        <p class="soe-helper">* Selecione as opções acima para continuar</p>
      </div>

    </div>
    <!-- FIM DA ETAPA 1 -->
  </div>
</section>

<!--  -->
<!-- CSS DO SIMULADOR                                             -->
<!--  -->
<style>
/*  */
/* VARIÁVEIS DO TEMA (ajuste conforme as cores da sua LP)         */
/*  */
:root {
  --soe-primary:     #1a3a4a;     /* Azul escuro iBuild          */
  --soe-primary-light: #2a5a6a;   /* Azul médio                  */
  --soe-accent:      #e8a838;     /* Dourado / laranja iBuild    */
  --soe-accent-hover:#d4952f;     /* Dourado escuro (hover)      */
  --soe-bg:          #f7f9fb;     /* Fundo claro                 */
  --soe-card-bg:     #ffffff;     /* Fundo do card               */
  --soe-text:        #2d3436;     /* Texto principal             */
  --soe-text-light:  #636e72;     /* Texto secundário            */
  --soe-border:      #dfe6e9;     /* Borda sutil                 */
  --soe-success:     #00b894;     /* Verde para selecionado      */
  --soe-radius:      12px;        /* Bordas arredondadas         */
  --soe-shadow:      0 4px 24px rgba(0,0,0,0.06);
  --soe-transition:  0.3s ease;
}

/*  */
/* SEÇÃO COMPLETA DO SIMULADOR                                   */
/*  */
.soe-section {
  padding: 80px 20px;
  background: var(--soe-bg);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

.soe-container {
  max-width: 720px;
  margin: 0 auto;
}

/* HEADER */
.soe-header {
  text-align: center;
  margin-bottom: 48px;
}

.soe-badge {
  display: inline-block;
  background: var(--soe-accent);
  color: #fff;
  padding: 8px 20px;
  border-radius: 50px;
  font-size: 0.875rem;
  font-weight: 600;
  letter-spacing: 0.5px;
  margin-bottom: 16px;
}

.soe-title {
  font-size: 2.2rem;
  font-weight: 800;
  color: var(--soe-primary);
  margin: 0 0 12px;
  line-height: 1.2;
}

.soe-title span {
  color: var(--soe-accent);
}

.soe-subtitle {
  font-size: 1.1rem;
  color: var(--soe-text-light);
  max-width: 540px;
  margin: 0 auto;
  line-height: 1.6;
}

/*  */
/* STEP CONTAINER                                                */
/*  */
.soe-step {
  display: none;
  animation: fadeInUp 0.5s ease;
}

.soe-step.active {
  display: block;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/*  */
/* PERGUNTAS                                                     */
/*  */
.soe-question {
  background: var(--soe-card-bg);
  border: 2px solid var(--soe-border);
  border-radius: var(--soe-radius);
  padding: 28px 32px;
  margin-bottom: 20px;
  box-shadow: var(--soe-shadow);
  transition: border-color var(--soe-transition);
}

.soe-question:has(.soe-option.selected) {
  border-color: var(--soe-primary-light);
}

.soe-question-label {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--soe-primary);
  margin: 0 0 16px;
}

/* OPÇÕES (Sim / Não) */
.soe-options {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.soe-option {
  flex: 1;
  min-width: 140px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 16px 24px;
  background: var(--soe-bg);
  border: 2px solid var(--soe-border);
  border-radius: 10px;
  cursor: pointer;
  font-size: 1rem;
  font-weight: 600;
  color: var(--soe-text);
  transition: all var(--soe-transition);
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.soe-option:hover {
  border-color: var(--soe-primary-light);
  background: #edf2f7;
  transform: translateY(-1px);
}

.soe-option.selected {
  border-color: var(--soe-accent);
  background: #fef9ef;
  color: var(--soe-primary);
  box-shadow: 0 0 0 3px rgba(232,168,56,0.15);
}

.soe-option-icon {
  font-size: 1.2rem;
}

/*  */
/* BOTÃO "MONTE SUA CASA"                                        */
/*  */
.soe-action {
  text-align: center;
  margin-top: 36px;
}

.soe-cta {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 18px 48px;
  font-size: 1.2rem;
  font-weight: 700;
  color: #fff;
  background: var(--soe-accent);
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: all var(--soe-transition);
  box-shadow: 0 6px 20px rgba(232,168,56,0.35);
  position: relative;
  overflow: hidden;
  min-width: 260px;
}

/* Efeito pulsante suave no CTA */
.soe-cta:not(:disabled) {
  animation: ctaPulse 2.5s ease-in-out infinite;
}

@keyframes ctaPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.03); }
}

.soe-cta:not(:disabled):hover {
  background: var(--soe-accent-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(232,168,56,0.45);
  animation: none; /* Para no hover */
}

.soe-cta:disabled {
  background: #b2bec3;
  cursor: not-allowed;
  box-shadow: none;
  animation: none;
  transform: none;
}

/* Texto auxiliar abaixo do botão */
.soe-helper {
  font-size: 0.85rem;
  color: var(--soe-text-light);
  margin-top: 12px;
  transition: opacity var(--soe-transition);
}

/*  */
/* RESPONSIVIDADE MOBILE-FIRST                                   */
/*  */
@media (max-width: 600px) {
  .soe-section {
    padding: 48px 16px;
  }

  .soe-title {
    font-size: 1.6rem;
  }

  .soe-subtitle {
    font-size: 0.95rem;
  }

  .soe-question {
    padding: 20px;
  }

  .soe-options {
    flex-direction: column;
  }

  .soe-option {
    justify-content: flex-start;
    padding: 14px 18px;
  }

  .soe-cta {
    width: 100%;
    padding: 16px 24px;
    font-size: 1.05rem;
    min-width: unset;
  }
}

@media (min-width: 601px) and (max-width: 900px) {
  .soe-option {
    padding: 14px 18px;
    font-size: 0.95rem;
  }
}
</style>

<!-- JAVASCRIPT DO SIMULADOR                                     -->
<!--  -->
<script>
/*
 * SIMULADOR DE ORÇAMENTO EXPRESS (SOE) - iBuild São Carlos
 * 
 * ATENÇÃO: Este é o esqueleto da Etapa 1.
 * Quando o usuário clicar em "Monte sua casa", você deve:
 *   1. Avançar para a Etapa 2 (seleção de estilo arquitetônico)
 *   2. No futuro: implementar as demais etapas
 */

// Alterna a seleção Sim/Não de uma pergunta
function selectOption(btn) {
  var parent = btn.closest('.soe-options');
  // Remove 'selected' de todos os irmãos
  var siblings = parent.querySelectorAll('.soe-option');
  siblings.forEach(function(opt) { opt.classList.remove('selected'); });
  // Marca o clicado
  btn.classList.add('selected');
  // Verifica se todas as perguntas foram respondidas para liberar o CTA
  verificarPronto();
}

// Verifica se todas as perguntas foram respondidas
function verificarPronto() {
  var todasRespondidas = true;

  // Lista todas as perguntas (.soe-options)
  var perguntas = document.querySelectorAll('.soe-options');
  perguntas.forEach(function(p) {
    var selecionada = p.querySelector('.soe-option.selected');
    if (!selecionada) { todasRespondidas = false; }
  });

  var btn = document.getElementById('btn-monte-sua-casa');
  var helper = document.querySelector('.soe-helper');

  if (todasRespondidas) {
    btn.disabled = false;
    helper.textContent = '✅ Clique para simular o valor da sua casa!';
    helper.style.color = '#00b894';
  } else {
    btn.disabled = true;
    helper.textContent = '* Selecione as opções acima para continuar';
    helper.style.color = '';
  }
}

// Ação do botão "Monte sua casa"
function avancarSimulador() {
  // Coleta as respostas (para depuração / envio futuro)
  var terreno = document.querySelector('.soe-options[data-question="terreno"] .soe-option.selected');
  var projeto = document.querySelector('.soe-options[data-question="projeto"] .soe-option.selected');

  var respostas = {
    terreno: terreno ? terreno.getAttribute('data-value') : null,
    projeto_arquitetonico: projeto ? projeto.getAttribute('data-value') : null
  };

  console.log('Respostas do cliente:', respostas);

  // 
  // TODO: PRÓXIMAS ETAPAS
  // Aqui você deve avançar para a Etapa 2:
  //   - Esconder .soe-step-1
  //   - Mostrar .soe-step-2 (seleção de estilo: Standard, Premium, Supreme)
  //   - E assim por diante
  // 

  // Exemplo de como você pode acessar as respostas depois:
  // var temTerreno = respostas.terreno === 'sim';  // true ou false
  // var temProjeto = respostas.projeto_arquitetonico === 'sim'; // true ou false

  alert('✅ Ótimo! Em breve você poderá montar sua casa completo aqui.\n\n' +
        'Terreno: ' + (respostas.terreno === 'sim' ? 'Sim' : 'Não, preciso de ajuda') + '\n' +
        'Projeto: ' + (respostas.projeto_arquitetonico === 'sim' ? 'Sim' : 'Não, preciso de um'));
}
</script>
